apiVersion: v1
kind: Service
metadata:
  name: {{ include "deploy-svc-probes.fullname" . }}
  labels:
    {{- include "deploy-svc-probes.commonLabels" . | nindent 4 }}
    {{- with .Values.service.additionalLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  {{- if .Values.service.trafficDistribution }}
  trafficDistribution: {{ .Values.service.trafficDistribution | quote }}
  {{- end }}
  ports:
    - port: {{ .Values.service.port }}
      protocol: TCP
      targetPort: {{ .Values.service.targetPort }}
  selector:
    {{- include "deploy-svc-probes.selectorLabels" . | nindent 4 }}
